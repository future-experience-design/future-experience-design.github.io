<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" href="./assets/favicon.png" />

  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="logo-link" href="./index.html" aria-label="Go to homepage">
          <img
            class="logo-mark"
            src="./assets/logo1.png"
            alt="FED group symbol"
          />

        <nav class="nav">
          <a class="active" href="./people.html">People</a>
          <a href="./publications.html">Publications</a>
          <a href="./contact.html">Contact</a>
        </nav>

      <main class="section page-content tab-gap">
        <div class="people-grid">
          <article class="member-card">
            <div class="member-photo">
              <img src="./assets/Sunok Lee.avif" alt="Sunok Lee" />
            </div>
            <h3>Sunok Lee</h3>
            <p>Assistant Professor</p>
          </article>
          <article class="member-card">
            <div class="member-photo">
              <img src="./assets/Madison.png" alt="Madison Cr" />

            <p>M.S. Student</p>

          <article class="member-card">
            <div class="member-photo">

            <h3>Sungho Kim</h3>
            <p>M.S. Student</p>
          </article>
          <article class="member-card">
            <div class="member-photo">
              <img src="./assets/Jaehee_Choi.png" alt="Jaehee Choi" />
            </div>
            <h3>Jaehee Choi</h3>
            <p>M.S. Student</p>

          <article class="member-card">
            <div class="member-photo">
              <img src="./assets/Nakyung_Jang.jpg" alt="Nakyung Jang" />
            </div>
            <h3>Nakyung Jang</h3>
            <p>Undergraduate Intern</p>
          </article>
          <article class="member-card">
            <div class="member-photo">
              <img src="./assets/Haeun_Rho.jpeg" alt="Haeun Rho" />
            </div>
            <h3>Haeun Rho</h3>
            <p>Undergraduate Intern</p>
